name: Windows RDP via Tailscale

on: [push]

jobs:
  rdp-setup:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Install Tailscale
      run: |
        # الرابط الصحيح لأحدث إصدار (تم التحديث)
        $installerUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-full-1.98.8.exe"
        Write-Output "Downloading Tailscale from $installerUrl"
        Invoke-WebRequest -Uri $installerUrl -OutFile tailscale-installer.exe -UseBasicParsing
        
        if (-not (Test-Path tailscale-installer.exe)) {
          Write-Error "Download failed"
          exit 1
        }
        
        Write-Output "Installing Tailscale silently..."
        Start-Process -FilePath ".\tailscale-installer.exe" -ArgumentList "/S" -Wait
        Remove-Item tailscale-installer.exe

        # البحث عن ملف tailscale.exe بعد التثبيت
        $possiblePaths = @(
          "C:\Program Files\Tailscale\Tailscale.exe",
          "C:\Program Files (x86)\Tailscale\Tailscale.exe"
        )
        $tailscaleExe = $null
        foreach ($p in $possiblePaths) {
          if (Test-Path $p) {
            $tailscaleExe = $p
            break
          }
        }
        
        if (-not $tailscaleExe) {
          Write-Error "tailscale.exe not found after installation"
          exit 1
        }
        
        Write-Output "Found Tailscale at: $tailscaleExe"
        echo "TAILSCALE_EXE=$tailscaleExe" >> $env:GITHUB_ENV

    - name: Authenticate and Connect Tailscale
      run: |
        $ErrorActionPreference = "Stop"
        Start-Sleep -Seconds 10
        $exe = $env:TAILSCALE_EXE
        Write-Output "Using Tailscale: $exe"
        & $exe up --auth-key "tskey-auth-kiNvF8Utn621CNTRL-e24cbr9FeP8YFv8XQK9AP8VKxf4KXPRYg" --hostname "github-rdp"
        Start-Sleep -Seconds 5
        $ip = & $exe ip -4
        Write-Output "Tailscale IP: $ip"
        echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV

    - name: Enable RDP and Firewall
      run: |
        Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        New-NetFirewallRule -DisplayName "Allow RDP via Tailscale" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 3389

    - name: Create Admin User
      run: |
        net user kamel007 Kamel@123 /add
        net localgroup administrators kamel007 /add

    - name: Display Connection Details
      run: |
        $ip = $env:TAILSCALE_IP
        Write-Output "============================================"
        Write-Output "||     ✅ RDP CONNECTION DETAILS         ||"
        Write-Output "============================================"
        Write-Output "Address: $ip:3389"
        Write-Output "Hostname: github-rdp"
        Write-Output "Username: kamel007"
        Write-Output "Password: Kamel@123"
        Write-Output "--------------------------------------------"
        Write-Output "Instructions:"
        Write-Output "1. Install Tailscale on your local machine"
        Write-Output "2. Sign in with the same Tailscale account"
        Write-Output "3. Press Win + R, type 'mstsc' and hit Enter"
        Write-Output "4. Connect to: $ip:3389"
        Write-Output "5. Use credentials above"
        Write-Output "============================================"

    - name: Keep Runner Alive
      run: |
        while ($true) { 
          Write-Output "Tailscale RDP tunnel active..."
          Start-Sleep -Seconds 300 
        }

    - name: Cleanup Tailscale
      if: always()
      run: |
        $exe = $env:TAILSCALE_EXE
        if ($exe -and (Test-Path $exe)) {
          & $exe down
        }
        Get-Process -Name "tailscale" -ErrorAction SilentlyContinue | Stop-Process -Force
        Get-Process -Name "tailscaled" -ErrorAction SilentlyContinue | Stop-Process -Force
