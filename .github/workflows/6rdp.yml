name: Windows RDP via Tailscale

on: [push]

jobs:
  rdp-setup:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Install Tailscale
      run: |
        # Use the official latest installer URL
        $installerUrl = "https://pkgs.tailscale.com/stable/win64/tailscale-installer.exe"
        Invoke-WebRequest -Uri $installerUrl -OutFile tailscale-installer.exe
        Start-Process -FilePath ".\tailscale-installer.exe" -ArgumentList "/S" -Wait
        Remove-Item tailscale-installer.exe
        # Tailscale installs to Program Files, but we need to find the exact path
        $tailscalePath = Get-ChildItem -Path "C:\Program Files\Tailscale" -Recurse -Filter "tailscale.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $tailscalePath) {
          Write-Error "Tailscale.exe not found after installation"
          exit 1
        }
        Write-Output "Tailscale installed at: $($tailscalePath.FullName)"
        echo "TAILSCALE_EXE=$($tailscalePath.FullName)" >> $env:GITHUB_ENV

    - name: Authenticate and Connect Tailscale
      run: |
        $ErrorActionPreference = "Stop"
        Start-Sleep -Seconds 10
        $tailscaleExe = $env:TAILSCALE_EXE
        & $tailscaleExe up --auth-key "tskey-auth-kiNvF8Utn621CNTRL-e24cbr9FeP8YFv8XQK9AP8VKxf4KXPRYg" --hostname "github-rdp"
        Start-Sleep -Seconds 5
        $tailscaleIP = & $tailscaleExe ip -4
        Write-Output "Tailscale IP: $tailscaleIP"
        echo "TAILSCALE_IP=$tailscaleIP" >> $env:GITHUB_ENV

    - name: Enable RDP and Firewall
      run: |
        Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        New-NetFirewallRule -DisplayName "Allow RDP via Tailscale" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 3389

    - name: Create Admin User
      run: |
        net user kamel007 Kamel@123 /add
        net localgroup administrators kamel007 /add

    - name: Display Connection Details
      run: |
        $tailscaleIP = $env:TAILSCALE_IP
        Write-Output "============================================"
        Write-Output "||     ✅ RDP CONNECTION DETAILS         ||"
        Write-Output "============================================"
        Write-Output "Address: $tailscaleIP:3389"
        Write-Output "Hostname: github-rdp"
        Write-Output "Username: kamel007"
        Write-Output "Password: Kamel@123"
        Write-Output "--------------------------------------------"
        Write-Output "Instructions:"
        Write-Output "1. Install Tailscale on your local machine"
        Write-Output "2. Sign in with the same Tailscale account"
        Write-Output "3. Press Win + R, type 'mstsc' and hit Enter"
        Write-Output "4. Connect to: $tailscaleIP:3389"
        Write-Output "5. Use credentials above"
        Write-Output "============================================"

    - name: Keep Runner Alive
      run: |
        while ($true) { 
          Write-Output "Tailscale RDP tunnel active..."
          Start-Sleep -Seconds 300 
        }

    - name: Cleanup Tailscale
      if: always()
      run: |
        $tailscaleExe = $env:TAILSCALE_EXE
        if ($tailscaleExe -and (Test-Path $tailscaleExe)) {
          & $tailscaleExe down
        }
        # Also try to kill processes by name
        Get-Process -Name "tailscale" -ErrorAction SilentlyContinue | Stop-Process -Force
        Get-Process -Name "tailscaled" -ErrorAction SilentlyContinue | Stop-Process -Force
